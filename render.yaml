services:
  - type: web
    name: reid-taylor-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd ../frontend && npm install && npm run build && cp -r dist ../backend/frontend_dist
    startCommand: >
      gunicorn app.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 30
      --graceful-timeout 10
      --log-level info
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: FAQ_PDF_PATH
        value: data/faq.pdf
      - key: PRODUCTS_JSON_PATH
        value: data/products.json
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health
