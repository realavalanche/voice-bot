services:
  - type: web
    name: reid-taylor-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 30
      --graceful-timeout 10
      --log-level info
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: PUBLIC_HOST
        value: voice-bot-c94z.onrender.com
      - key: FAQ_PDF_PATH
        value: data/faq.pdf
      - key: PRODUCTS_JSON_PATH
        value: data/products.json
      - key: PYTHON_VERSION
        value: "3.11"
    healthCheckPath: /health

  - type: static
    name: reid-taylor-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://voice-bot-c94z.onrender.com
